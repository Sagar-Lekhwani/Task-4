<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creative Portfolio Grid</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="portfolio-layout">

  

    <div class="side-nav">
      <span>Clients</span>
      <span>Research</span>
      <span>Portfolio</span>
      <span>Podcast</span>
    </div>

    

    <div class="card profile-card">

      <div class="about">
        About Me
      </div>

      <div class="profile-image">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200" alt="">
      </div>

      <div class="profile-content">
        <h2>
          Im,<br>
          Jon<br>
          Daniel
        </h2>

        <p>
          inquiry@jondaniel.design ✉
        </p>
      </div>

      <div class="circle-badge">
        SOZO<br>
        DESIGN<br>
        PORTFOLIO
      </div>

    </div>

    

    <div class="title-area">
      <h1>Portfolio </h1><img src="../images/chevron.png" alt="">
    </div>

   

    <div class="card video-card">

      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600" alt="">

      <div class="play-btn">
        ▶
      </div>

    </div>

    

    <div class="stats-wrapper">

      <div class="stat-box mint">
        <h2>251</h2>
        <p>Projects</p>
      </div>

      <div class="stat-box purple">
        <h2>156</h2>
        <p>Awards</p>
      </div>

    </div>

    

    <div class="bottom-row">


      <div class="card clients-card">

        <div class="top-arrow">
    <img src="../images/chevron.png" alt="">
  </div>

        <div class="apple">
          <img src="../images/apple.png" alt="">
        </div>

        <h3>Clients</h3>

      </div>

      
      <div class="yellow-wrapper">

      

        <div class="black-orb-card">
          <div class="sphere"></div>
        </div>

        
        <div class="card awards-card">

             <div class="black ">
    <img src="../images/chevron.png" alt="">
  </div>

          <div class="award-content">

            <h2>172</h2>

            <p>
              Global Design<br>
              Awards.
            </p>

          </div>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
